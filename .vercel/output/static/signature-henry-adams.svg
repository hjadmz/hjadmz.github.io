<!--
  PLACEHOLDER SIGNATURE — replace this file with your real signature SVG.

  How to swap in your real signature:

    1. Export your signature from a tracing app (Pixelmator, Figma, Illustrator,
       or any vectorizer) as an SVG.
    2. Open the exported .svg in a text editor.
    3. Find every `fill="#000"` (or similar hex color) and every `stroke="#000"`.
       Replace with `fill="currentColor"` and `stroke="currentColor"`.
       That single change makes the signature flip automatically between
       light and dark color schemes — no additional CSS needed.
    4. Save the result to this exact path, overwriting this placeholder:
          /public/signature-henry-adams.svg

  If you only have a PNG (transparent background, dark strokes), save it as:
          /public/signature-henry-adams.png
    The CSS in src/pages/about.astro auto-falls-back to the PNG via
    the <img onerror> handler, and `filter: invert(1)` is applied in dark mode.

  The image container is sized via CSS clamp() — the signature scales fluidly
  from 3rem tall on small screens up to 5.5rem on wide ones. Any intrinsic
  aspect ratio is preserved (width auto).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" role="img" aria-labelledby="placeholder-title">
