<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <!-- PWA support -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="preload" href="https://cdn.tailwindcss.com" as="script">

  <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style">
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    /* CSS Reset and Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* System font stack with fallbacks */
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
        Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    body {
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Accessibility: Skip to main content */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #4f46e5;
      color: white;
      padding: 8px;
      z-index: 100;
      transition: top 0.2s;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Reduced motion preferences */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      
      .pulse::after {
        animation: none !important;
      }
      
      .project-card {
        transition: none !important;
      }
    }

    /* High contrast mode support */
    @media (forced-colors: active) {
      .glass {
        background: Canvas;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        border: 1px solid CanvasText;
      }
      
      .project-card {
        border: 1px solid CanvasText;
      }
      
      .pulse {
        background: CanvasText;
      }
      
      .language-dot {
        border: 1px solid CanvasText;
      }
    }

    /* Light mode styles */
    @media (prefers-color-scheme: light) {
      body {
        background: #f8fafc;
        color: #1e293b;
      }
      
      .glass {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      
      .project-card {
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      
      .project-card:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      
      .time-overlay,
      .location-overlay {
        background: rgba(255, 255, 255, 0.9);
        color: #1e293b;
      }
      
      .text-gray-400 {
        color: #64748b;
      }
    }

    /* Dark mode styles */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0a0a0a;
        color: #ffffff;
      }
      
      .glass {
        background: rgba(17, 25, 40, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.125);
      }
      
      .project-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .project-card:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      
      .time-overlay,
      .location-overlay {
        background: rgba(17, 25, 40, 0.9);
        color: white;
      }
    }

    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Map styles with accessibility considerations */
    .map-container {
      position: relative;
      height: calc(200px + var(--safe-bottom));
      border-radius: 1rem;
      overflow: hidden;
      margin: 1.5rem 0;
      contain: content;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      border-radius: 1rem;
      z-index: 1;
    }

    .time-overlay {
      position: absolute;
      top: max(1rem, var(--safe-top));
      right: 1rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      z-index: 2;
      backdrop-filter: blur(10px);
      font-weight: 500;
    }

    .location-overlay {
      position: absolute;
      bottom: max(1rem, var(--safe-bottom));
      left: 1rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      z-index: 2;
      backdrop-filter: blur(10px);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Pulse animation with reduced motion consideration */
    .pulse {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      position: relative;
    }

    @media (prefers-reduced-motion: no-preference) {
      .pulse::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: rgba(34, 197, 94, 0.4);
        border-radius: 50%;
        top: -5px;
        left: -5px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    }

    /* Project card styles with accessibility improvements */
    .project-card {
      transition: transform 0.2s ease, background-color 0.2s ease;
      cursor: pointer;
      position: relative;
      contain: content;
    }

    /* Touch device optimizations */
    @media (hover: hover) and (pointer: fine) {
      .project-card:hover,
      .project-card:focus {
        transform: translateY(-2px);
      }
    }

    /* Focus styles */
    .project-card:focus-visible {
      outline: 3px solid #4f46e5;
      outline-offset: 2px;
    }

    .language-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    /* Screen reader only text */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Safe area insets for modern iOS devices */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
        padding-top: max(1rem, env(safe-area-inset-top));
      }
    }

    .leaflet-control-attribution {
      display: none;
    }
  </style>
</head>
<body class="min-h-screen p-4">

  <script>
    // Feature detection and progressive enhancement
    const deviceSupport = {
      touch: 'ontouchstart' in window,
      pointer: window.matchMedia('(pointer: fine)').matches,
      reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
      highContrast: window.matchMedia('(forced-colors: active)').matches,
      darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
      safariMobile: /iPhone|iPod|iPad/.test(navigator.platform),
      standalone: window.navigator.standalone,
      screenReader: window.matchMedia('(forced-colors: active)').matches || 
                   document.querySelector('[role="alert"]') !== null
    };

    const supportsBackdropFilter = CSS.supports('backdrop-filter', 'blur(16px)');
    if (!supportsBackdropFilter) {
      document.querySelectorAll('.glass').forEach(el => {
        el.style.background = deviceSupport.darkMode
          ? 'rgba(17, 25, 40, 0.95)'
          : 'rgba(255, 255, 255, 0.95)';
      });
    }

    // Detect low-end devices
    const isLowEnd = () => {
      return (
        !window.matchMedia('(min-resolution: 2dppx)').matches &&
        navigator.hardwareConcurrency <= 4 &&
        !supportsBackdropFilter
      );
    };

    // Initialize map with performance considerations
    let map;
    try {
      const centerLat = 38.7000;
      const centerLng = -90.3500;

      map = L.map('map', {
        center: [centerLat, centerLng],
        zoom: 9.5,
        zoomControl: false,
        attributionControl: false,
        dragging: !isLowEnd(),
        scrollWheelZoom: false,
        fadeAnimation: !isLowEnd(),
        zoomAnimation: !isLowEnd(),
        keyboard: true, // Enable keyboard navigation
        inertia: !deviceSupport.reducedMotion
      });

      const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const tileLayer = isDarkMode
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

      L.tileLayer(tileLayer, {
        maxZoom: 19,
        detectRetina: !isLowEnd()
      }).addTo(map);

      // Create a larger circle to indicate the general area
      const areaCircle = L.circle([centerLat, centerLng], {
        color: '#22c55e',
        fillColor: '#22c55e',
        fillOpacity: 0.1,
        radius: 50000,
        weight: 1
      }).addTo(map);

      // Smaller marker in the center
      const marker = L.circleMarker([centerLat, centerLng], {
        color: '#22c55e',
        fillColor: '#22c55e',
        fillOpacity: 0.5,
        radius: 6
      }).addTo(map);

      // Enhanced color scheme handling
      const colorSchemeMedia = window.matchMedia('(prefers-color-scheme: dark)');
      const handleColorSchemeChange = (e) => {
        const newTileLayer = e.matches
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
          : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        
        map.eachLayer((layer) => {
          if (layer instanceof L.TileLayer) {
            map.removeLayer(layer);
          }
        });
        
        L.tileLayer(newTileLayer, {
          maxZoom: 19,
          detectRetina: !isLowEnd()
        }).addTo(map);
      };

      colorSchemeMedia.addEventListener('change', handleColorSchemeChange);

    } catch (e) {
      console.error('Map initialization failed:', e);
      const mapContainer = document.querySelector('.map-container');
      mapContainer.style.display = 'none';
      document.getElementById('announcer').textContent = 'Map loading failed. Location information is still available in text format.';
    }

    // Enhanced time display with error handling and accessibility
    function updateTime() {
      try {
        const options = {
          timeZone: 'America/Chicago',
          hour: 'numeric',
          minute: 'numeric',
          hour12: true
        };
        const time = new Date().toLocaleString('en-US', options);
        const timeDisplay = document.getElementById('time-display');
        timeDisplay.textContent = `${time} (CDT)`;
        timeDisplay.setAttribute('aria-label', `Current time: ${time} Central Daylight Time`);
      } catch (e) {
        console.error('Time update failed:', e);
        document.getElementById('announcer').textContent = 'Time display currently unavailable.';
      }
    }

    // Performance optimized time update
    let timeoutId;
    function debouncedTimeUpdate() {
      clearTimeout(timeoutId);
      timeoutId = setTimeout(updateTime, 1000);
    }

    // Initialize time display
    updateTime();
    const timeUpdateInterval = setInterval(debouncedTimeUpdate, 1000);

    // Enhanced focus management
    function manageFocus() {
      const focusableElements = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
      const focusable = document.querySelectorAll(focusableElements);
      
      focusable.forEach(el => {
        el.addEventListener('focus', () => {
          const label = el.getAttribute('aria-label') || el.textContent;
          document.getElementById('announcer').textContent = `${label} focused`;
        });
      });
    }

    // Viewport height fix for mobile browsers
    function setVhProperty() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    // Initialize enhancements
    document.addEventListener('DOMContentLoaded', () => {
      manageFocus();
      setVhProperty();
      
      // Handle orientation changes
      window.addEventListener('orientationchange', () => {
        setTimeout(setVhProperty, 100);
      });
      
      // Handle resize events (debounced)
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          setVhProperty();
          if (map) map.invalidateSize();
        }, 250);
      });
    });

    // Error boundary
    window.addEventListener('error', (event) => {
      console.error('Application error:', event.error);
      document.getElementById('announcer').textContent = 'An error occurred. Please try refreshing the page.';
    });

    // Clean up on page hide/unload
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(timeUpdateInterval);
        if (map) map.remove();
      }
    });

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(error => {
          console.error('Service worker registration failed:', error);
        });
      });
    }
  </script>
