<body class="min-h-screen p-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
  <div class="w-full max-w-2xl mx-auto">
    <main class="p-6 rounded-2xl glass bg-gray-900/75 dark:bg-gray-900/95 border-gray-200 dark:border-gray-600 mb-6">
      <!-- Profile section -->
      <div class="flex items-center gap-4 mb-6">
        <img 
          src="https://cdn.discordapp.com/avatars/1334945871791526020/2ef32b7faee9d6cb74e9c79fffcd5901.webp?size=1024" 
          alt="Profile picture of hjadmz"
          class="w-16 h-16 rounded-xl shadow-lg object-cover"
          loading="lazy"
          width="64"
          height="64"
        >
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <h1 class="text-xl font-bold">hjadmz</h1>
              <p class="text-sm text-gray-400 dark:text-gray-300">Full Stack Developer</p>
            </div>
            <a href="mailto:hjadmz@icloud.com"
              class="px-4 py-2 rounded-xl flex items-center gap-2 text-sm bg-white/5 dark:bg-gray-700/50 hover:bg-white/10 dark:hover:bg-gray-700/60 transition-all"
              aria-label="Send email to hjadmz">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <span>Email</span>
            </a>
          </div>
        </div>
      </div>

      <!-- Map section -->
      <div class="map-container" role="region" aria-label="Location map showing Greater St. Louis Area">
        <div id="map"></div>
        <div class="time-overlay bg-gray-900/90 dark:bg-gray-800/90 text-white" id="time-display" aria-live="polite"></div>
        <div class="location-overlay bg-gray-900/90 dark:bg-gray-800/90 text-white">
          <div class="pulse" aria-hidden="true"></div>
          <span>Greater St. Louis Area</span>
        </div>
      </div>

      <!-- Projects section -->
      <div class="space-y-3" id="repos-container" role="list">
        <div class="project-card p-4 rounded-xl bg-gray-100 dark:bg-gray-700 border-gray-200 dark:border-gray-600"
             onclick="window.open('https://hjadmz.github.io', '_blank')"
             onkeypress="(event.key === 'Enter' || event.key === ' ') && window.open('https://hjadmz.github.io', '_blank')"
             role="listitem"
             tabindex="0"
             aria-label="Project: hjadmz.github.io">
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="font-medium mb-1">hjadmz.github.io</h3>
              <p class="text-sm text-gray-400 dark:text-gray-300 line-clamp-1">Personal Website</p>
            </div>
          </div>
          <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-300">
            <div class="flex items-center">
              <span class="language-dot" style="background-color: #e34c26" aria-hidden="true"></span>
              HTML
            </div>
            <span>1 week ago</span>
          </div>
        </div>

        <div class="project-card p-4 rounded-xl bg-gray-100 dark:bg-gray-700 border-gray-200 dark:border-gray-600"
             onclick="window.open('https://github.com/hjadmz/macimizer', '_blank')"
             onkeypress="(event.key === 'Enter' || event.key === ' ') && window.open('https://github.com/hjadmz/macimizer', '_blank')"
             role="listitem"
             tabindex="0"
             aria-label="Project: macimizer">
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="font-medium mb-1">macimizer</h3>
              <p class="text-sm text-gray-400 dark:text-gray-300 line-clamp-1">Mac Optimization Tool</p>
            </div>
          </div>
          <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-300">
            <div class="flex items-center">
              <span class="language-dot" style="background-color: #89e051" aria-hidden="true"></span>
              Shell
            </div>
            <span>2 weeks ago</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
