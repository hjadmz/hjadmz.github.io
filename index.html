      to { opacity: 1; transform: translateY(0); }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }

    /* Social Links Styles */
    .social-links {

      gap: 12px;

    .social-link svg {

    .social-link.instagram {

    .social-link.linkedin {

    .social-link:hover {

    /* Enhanced Map Styles */
    .map-container {
      position: relative;
      height: 240px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow-color);
    }

    .map-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--card-light);
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow-color);
    }

    .weather-info {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .weather-icon {
      width: 24px;
      height: 24px;
    }

    /* Activity Chart Styles */
    .activity-chart {
      width: 100%;
      height: 120px;
      margin-top: 16px;
    }

    /* Enhanced Card Animations */
    .card {
      animation: fadeIn 0.5s var(--bounce-timing) backwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    /* Status Indicator */
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary-light);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent-color);
      animation: pulse 2s infinite;
    }

    /* Dark mode enhancements */
    @media (prefers-color-scheme: dark) {
      .social-link:not(.instagram):not(.discord):not(.linkedin) {

        background: var(--card-dark);
        color: var(--text-primary-dark);
      }

      }

<script>
// Configuration
const CONFIG = {
  github: {
    username: 'hjadmz',
    reposPerPage: 5
  },
  weather: {
    apiKey: 'YOUR_OPENWEATHER_API_KEY', // You'll need to get an API key from OpenWeatherMap
    city: 'St. Louis'
  },
  map: {
    center: [38.7500, -90.4800],
    radius: 48000,
    defaultZoom: 9.2
  }
};

// State management
const state = {
  darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
  loading: true,
  activityData: [],
  weatherData: null,
  projects: [],
  lastUpdate: null
};

// Enhanced GitHub API Integration
class GitHubAPI {
  static async fetchProfile() {
    try {
      const response = await fetch(`https://api.github.com/users/${CONFIG.github.username}`);
      if (!response.ok) throw new Error('Failed to fetch GitHub profile');
      return await response.json();
    } catch (error) {
      console.error('GitHub Profile Error:', error);
      return null;
    }
  }

  static async fetchRepositories() {
    try {
      const response = await fetch(
        `https://api.github.com/users/${CONFIG.github.username}/repos?sort=updated&per_page=${CONFIG.github.reposPerPage}`
      );
      if (!response.ok) throw new Error('Failed to fetch repositories');
      return await response.json();
    } catch (error) {
      console.error('GitHub Repos Error:', error);
      return [];
    }
  }

  static async fetchContributions() {
    try {
      // This would typically require a backend proxy due to CORS
      // Simulating contribution data for now
      return Array.from({ length: 30 }, () => 
        Math.floor(Math.random() * 10)
      );
    } catch (error) {
      console.error('Contributions Error:', error);
      return [];
    }
  }
}

// Weather Integration
class WeatherService {
  static async fetchWeather() {
    try {
      const response = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${CONFIG.weather.city}&appid=${CONFIG.weather.apiKey}&units=imperial`
      );
      if (!response.ok) throw new Error('Failed to fetch weather');
      const data = await response.json();
      state.weatherData = {
        temp: Math.round(data.main.temp),
        condition: data.weather[0].main,
        icon: `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`
      };
      return state.weatherData;
    } catch (error) {
      console.error('Weather Error:', error);
      return null;
    }
  }
}

// Enhanced Map Implementation
class MapManager {
  static initialize() {
    const map = L.map('map', {
      center: CONFIG.map.center,
      zoom: CONFIG.map.defaultZoom,
      zoomControl: true,
      attributionControl: false,
      keyboard: true,
      tap: 'ontouchstart' in window,
      bounceAtZoomLimits: false,
      maxBoundsViscosity: 1.0
    });

    this.setTileLayer(map);
    this.addLocationMarker(map);
    return map;
  }

  static setTileLayer(map) {
    const isDark = state.darkMode;
    const tileUrl = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    map.eachLayer((layer) => map.removeLayer(layer));

    L.tileLayer(tileUrl, {
      maxZoom: 19,
      minZoom: 8,
      errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
    }).addTo(map);
  }

  static addLocationMarker(map) {
    const circle = L.circle(CONFIG.map.center, {
      color: '#22c55e',
      fillColor: '#22c55e',
      fillOpacity: 0.15,
      radius: CONFIG.map.radius,
      weight: 2
    }).addTo(map);

    // Add pulse animation
    const pulseCircle = L.circle(CONFIG.map.center, {
      color: '#22c55e',
      fillColor: '#22c55e',
      fillOpacity: 0.3,
      radius: CONFIG.map.radius * 0.8,
      weight: 0
    }).addTo(map);

    // Animate pulse
    setInterval(() => {
      pulseCircle.setStyle({ fillOpacity: 0.3 });
      setTimeout(() => {
        pulseCircle.setStyle({ fillOpacity: 0.1 });
      }, 1000);
    }, 2000);
  }
}

// Activity Chart
class ActivityChart {
  static initialize(data) {
    const ctx = document.getElementById('activity-chart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 160);
    gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
    gradient.addColorStop(1, 'rgba(34, 197, 94, 0)');

    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: Array.from({ length: data.length }, (_, i) => i + 1),
        datasets: [{
          label: 'Activity',
          data: data,
          fill: true,
          backgroundColor: gradient,
          borderColor: '#22c55e',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: { display: false },
          y: { display: false }
        },
        interaction: {
          intersect: false,
          mode: 'index'
        }
      }
    });
  }
}

// UI Updates
class UI {
  static async initialize() {
    state.loading = true;
    this.showLoading();

    try {
      await this.updateAll();
    } finally {
      this.hideLoading();
      state.loading = false;
    }

    this.setupEventListeners();
  }

  static async updateAll() {
    const [profile, repos, contributions, weather] = await Promise.all([
      GitHubAPI.fetchProfile(),
      GitHubAPI.fetchRepositories(),
      GitHubAPI.fetchContributions(),
      WeatherService.fetchWeather()
    ]);

    this.updateProfile(profile);
    this.updateProjects(repos);
    this.updateWeather(weather);
    ActivityChart.initialize(contributions);
  }
        // Continuing UI class...
  static updateProfile(profile) {
    if (!profile) return;
    
    document.getElementById('profile-bio').textContent = profile.bio || 'Full Stack Developer passionate about creating innovative solutions';
    
    // Update status based on time of day and availability
    const hour = new Date().getHours();
    const statusText = document.getElementById('status-text');
    if (hour >= 22 || hour < 6) {
      statusText.textContent = 'Currently resting';
      document.querySelector('.status-dot').style.backgroundColor = '#fbbf24';
    }
  }

  static updateProjects(repos) {
    const container = document.getElementById('projects-container');
    if (!repos.length) {
      container.innerHTML = '<p class="no-projects">No projects available at the moment</p>';
      return;
    }

    container.innerHTML = repos
      .map(repo => `
        <div class="project-card" data-repo-id="${repo.id}">
          <div class="project-header">
            <h3 class="project-name">
              <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer">
                ${repo.name}
              </a>
            </h3>
            <span class="project-visibility">${repo.private ? 'Private' : 'Public'}</span>
          </div>
          <p class="project-description">${repo.description || 'No description available'}</p>
          <div class="project-meta">
            <span class="project-language" style="--lang-color: ${this.getLanguageColor(repo.language)}">
              ${repo.language || 'Various'}
            </span>
            <span class="project-stats">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" class="star-icon">
                <path fill="currentColor" d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"/>
              </svg>
              ${repo.stargazers_count}
            </span>
            <span class="project-updated">Updated ${this.timeAgo(new Date(repo.updated_at))}</span>
          </div>
        </div>
      `)
      .join('');
  }

  static updateWeather(weather) {
    if (!weather) return;
    
    const iconEl = document.getElementById('weather-icon');
    const tempEl = document.getElementById('weather-temp');
    
    iconEl.src = weather.icon;
    iconEl.alt = weather.condition;
    tempEl.textContent = `${weather.temp}°F`;
  }

  static setupEventListeners() {
    // Dark mode listener
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      state.darkMode = e.matches;
      this.updateTheme();
    });

    // Time update
    this.updateTime();
    setInterval(() => this.updateTime(), 1000);

    // Project card hover effects
    document.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('mouseenter', this.handleProjectHover);
      card.addEventListener('mouseleave', this.handleProjectLeave);
    });
  }

  static updateTime() {
    const timeDisplay = document.getElementById('time-display');
    const now = new Date();
    const options = {
      hour: 'numeric',
      minute: '2-digit',
      hour12: true,
      timeZone: 'America/Chicago'
    };
    timeDisplay.textContent = now.toLocaleString('en-US', options);
  }

  static updateTheme() {
    const map = document.querySelector('#map')?._leaflet_map;
    if (map) {
      MapManager.setTileLayer(map);
    }
    document.documentElement.classList.toggle('dark', state.darkMode);
  }

  static getLanguageColor(language) {
    const colors = {
      JavaScript: '#f1e05a',
      TypeScript: '#2b7489',
      Python: '#3572A5',
      Java: '#b07219',
      HTML: '#e34c26',
      CSS: '#563d7c',
      default: '#8b949e'
    };
    return colors[language] || colors.default;
  }

  static timeAgo(date) {
    const seconds = Math.floor((new Date() - date) / 1000);
    const intervals = {
      year: 31536000,
      month: 2592000,
      week: 604800,
      day: 86400,
      hour: 3600,
      minute: 60
    };

    for (const [unit, secondsInUnit] of Object.entries(intervals)) {
      const interval = Math.floor(seconds / secondsInUnit);
      if (interval >= 1) {
        return `${interval} ${unit}${interval === 1 ? '' : 's'} ago`;
      }
    }
    return 'just now';
  }

  static showLoading() {
    document.getElementById('loading-overlay').style.display = 'flex';
  }

  static hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

  static handleProjectHover(e) {
    const card = e.currentTarget;
    card.style.transform = 'translateY(-4px)';
    card.style.boxShadow = '0 12px 24px rgba(0, 0, 0, 0.1)';
  }

  static handleProjectLeave(e) {
    const card = e.currentTarget;
    card.style.transform = 'none';
    card.style.boxShadow = 'none';
  }
}

// Initialize everything when the DOM is ready
document.addEventListener('DOMContentLoaded', async () => {
  const map = MapManager.initialize();
  await UI.initialize();

  // Periodic updates
  setInterval(async () => {
    await UI.updateAll();
  }, 300000); // Update every 5 minutes
});

// Handle service worker if needed
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(console.error);
  });
}
</script>
