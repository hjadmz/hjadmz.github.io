<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>hjadmz - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --social-bg: #f5f5f5;
            --social-icon: #808080;
            --card-shadow: rgba(0, 0, 0, 0.1);
            --github-hover: #333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #2d2d2d;
                --text-primary: #ffffff;
                --text-secondary: #cccccc;
                --social-bg: #363636;
                --social-icon: #a0a0a0;
                --card-shadow: rgba(0, 0, 0, 0.3);
                --github-hover: #ffffff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s ease;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            margin: 20px;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--card-shadow);
            text-align: center;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .profile-image-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.215, 0.610, 0.355, 1.000);
            will-change: transform;
            cursor: pointer;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 5px 15px var(--card-shadow);
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .title {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
        }

        .social-link {
            text-decoration: none;
            width: 40px;
            height: 40px;
            font-size: 20px;
            border-radius: 50%;
            background: var(--social-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .social-link i {
            color: var(--social-icon);
            transition: color 0.2s ease;
        }

        .social-link:hover {
            transform: scale(1.1);
        }

        .social-link.github:hover i {
            color: var(--github-hover);
        }

        .social-link.figma:hover i {
            color: #F24E1E;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #007AFF;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin: 0 auto;
            width: fit-content;
        }

        .contact-button:hover {
            transform: scale(1.02);
            background: #0066CC;
        }

        .envelope-icon {
            position: relative;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope-closed,
        .envelope-open {
            position: absolute;
            color: white;
            font-size: 18px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        .envelope-closed {
            opacity: 1;
            transform: scale(1);
        }

        .envelope-open {
            opacity: 0;
            transform: scale(0.95);
        }

        .contact-button:hover .envelope-closed {
            opacity: 0;
            transform: scale(1.05);
        }

        .contact-button:hover .envelope-open {
            opacity: 1;
            transform: scale(1);
        }

        @media (max-width: 480px) {
            .card-container {
                padding: 0 15px;
            }

            .profile-card {
                padding: 30px 20px;
            }

            .profile-image-container {
                width: 120px;
                height: 120px;
            }

            .name {
                font-size: 20px;
            }

            .title {
                font-size: 14px;
            }

            .contact-button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="profile-card">
            <div class="profile-image-container">
                <img src="https://github.com/hjadmz.png" alt="hjadmz" class="profile-image" 
                     onerror="this.src='https://github.com/identicons/hjadmz'">
            </div>
            <h1 class="name">hjadmz</h1>
            <p class="title">Developer & Designer</p>
            <div class="social-links">
                <a href="https://github.com/hjadmz" class="social-link github" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.figma.com/@hjadmz" class="social-link figma" target="_blank" rel="noopener">
                    <i class="fab fa-figma"></i>
                </a>
            </div>
            <a href="mailto:hjadmz@icloud.com" class="contact-button">
                <div class="envelope-icon">
                    <i class="fas fa-envelope envelope-closed"></i>
                    <i class="fas fa-envelope-open envelope-open"></i>
                </div>
                Contact Me
            </a>
        </div>
    </div>

    <script>
        const hasPointer = window.matchMedia('(pointer: fine)').matches;

        if (hasPointer) {
            const image = document.querySelector('.profile-image-container');
            let isHovering = false;
            let currentX = 0;
            let currentY = 0;
            let targetX = 0;
            let targetY = 0;
            let animationFrameId = null;

            function lerp(start, end, factor) {
                return start + (end - start) * factor;
            }

            function updatePosition() {
                if (!isHovering && Math.abs(currentX) < 0.01 && Math.abs(currentY) < 0.01) {
                    currentX = 0;
                    currentY = 0;
                    image.style.transform = 'translate(0, 0)';
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                    return;
                }

                const smoothFactor = 0.08;
                currentX = lerp(currentX, targetX, smoothFactor);
                currentY = lerp(currentY, targetY, smoothFactor);
                
                image.style.transform = `translate(${currentX}px, ${currentY}px)`;
                animationFrameId = requestAnimationFrame(updatePosition);
            }

            function startAnimation() {
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(updatePosition);
                }
            }

            function handleMouseMove(e) {
                if (!isHovering) return;

                const rect = image.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const mouseX = e.clientX - centerX;
                const mouseY = e.clientY - centerY;
                
                const maxMove = 8;
                targetX = (mouseX / rect.width) * maxMove * 2;
                targetY = (mouseY / rect.height) * maxMove * 2;

                startAnimation();
            }

            function handleMouseEnter() {
                isHovering = true;
                startAnimation();
            }

            function handleMouseLeave() {
                isHovering = false;
                targetX = 0;
                targetY = 0;
                startAnimation();
            }

            image.removeEventListener('mouseenter', handleMouseEnter);
            image.removeEventListener('mouseleave', handleMouseLeave);
            document.removeEventListener('mousemove', handleMouseMove);

            image.addEventListener('mouseenter', handleMouseEnter);
            image.addEventListener('mouseleave', handleMouseLeave);
            document.addEventListener('mousemove', handleMouseMove);
        }
    </script>
</body>
</html>
