<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — hjadmz</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F9FAFB">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #F9FAFB; --text: #020617; --muted: #475569; --link: #1E40AF; --ring: #1E40AF;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #020617; --text: #E2E8F0; --muted: #97A6BB; --link: #60A5FA; --ring: #60A5FA; }
    }
    * { box-sizing: border-box; margin: 0; }
    html { color-scheme: light dark; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      min-height: 100svh; display: grid; place-items: center; padding: 1.5rem;
      line-height: 1.6;
    }
    main { max-width: 65ch; }
    h1 { font-size: clamp(1.953rem, 1.86rem + 0.49vw, 2.197rem); font-weight: 600; line-height: 1.2; }
    p { margin-top: 1rem; color: var(--muted); }
    a { color: var(--link); text-decoration: underline; text-underline-offset: 0.2em; }
    :focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
